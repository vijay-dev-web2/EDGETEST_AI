name: EdgeTest AI — CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  COVERAGE_THRESHOLD: 80

jobs:
  backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -r backend/requirements.txt || true

      - name: Run backend tests
        run: |
          cd backend
          pytest tests/ -v --tb=short \
            --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend Tests (npm test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --coverage --coverageReporters=json-summary --watchAll=false

      - name: Enforce coverage threshold
        run: |
          node -e "
          const fs = require('fs');
          const summary = JSON.parse(
            fs.readFileSync('frontend/coverage/coverage-summary.json', 'utf8')
          );
          const pct = summary.total.lines.pct;
          const threshold = parseInt(process.env.COVERAGE_THRESHOLD);
          console.log('Frontend coverage: ' + pct + '%');
          if (pct < threshold) {
            console.error('Coverage ' + pct + '% is below threshold ' + threshold + '%');
            process.exit(1);
          }
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
