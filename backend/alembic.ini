[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template for new revision file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with the backend/ directory so our modules resolve
prepend_sys_path = .

# Timezone for revision timestamps
timezone = UTC

# Max characters in the auto-generated slug
truncate_slug_length = 40

# Whether to allow .pyc files in the versions/ directory
sourceless = false

# Version locations (single location)
version_locations = %(here)s/alembic/versions

# Output encoding
output_encoding = utf-8

# DATABASE_URL is injected by env.py from config.py — leave sqlalchemy.url blank.
sqlalchemy.url =


[post_write_hooks]
# Optional: run black on newly generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
